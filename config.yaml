# WeCom Auto End 配置文件

# 监控间隔（秒）
monitor_interval: 10

# Brainmaker 调用配置
brainmaker:
  # 请求间隔（秒），避免触发频控
  request_interval: 3
  
  # 模型优先级列表
  models:
    - claude-opus-4-5-20251101
    - claude-sonnet-4-5-20250514
    - claude-sonnet-3-5-20241022
    - gpt-4o-mini
    - deepseek-chat
  
  # 缓存配置
  cache:
    enabled: true
    ttl: 300  # 缓存有效期（秒），5分钟内相同群不重复判断

# 判断配置
judge:
  # uncertain 状态下是否调用 Brainmaker
  call_on_uncertain: true
  
  # 置信度阈值
  confidence_threshold: 0.8
