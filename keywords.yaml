# 企微自动结束会话 - 关键词配置
# 每个人可以根据自己的习惯调整评分和关键词

# 客户确认词（表示客户同意或确认）
customer_confirm:
  score: 3
  keywords:
    - 好的
    - OK
    - ok
    - 可以
    - 没问题
    - 明白了
    - 收到
    - 了解

# 客户感谢词（表示客户表达感谢）
customer_thanks:
  score: 2
  keywords:
    - 谢谢
    - 感谢
    - 多谢
    - 辛苦了
    - 麻烦了

# 我方承诺词（表示我方会稍后处理）
our_promise:
  score: 2
  keywords:
    - 稍后
    - 稍候
    - 一会
    - 马上
    - 尽快
    - 后续
    - 明天
    - 下周

# 问题已解决词（表示问题已经解决）
problem_solved:
  score: 2
  keywords:
    - 已解决
    - 已修复
    - 已处理
    - 已完成
    - 搞定
    - 好了
    - 正常了

# 新问题出现词（表示客户提出新问题，负分）
new_problem:
  score: -5
  keywords:
    - 还有个问题
    - 另外
    - 还想问
    - 再问一下
    - 顺便问下
    - 对了
    - 还有就是

# 评分阈值
thresholds:
  # 评分 >= strong_end 时，强制关闭
  strong_end: 4
  # 评分 < keep 时，保留会话
  keep: 0
  # 其他情况调用 AI 判断
